version: "3.8"

services:
  magnatrix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magnatrix-os
    ports:
      - "8080:8080"
    volumes:
      - magnatrix-data:/opt/magnatrix/data
      - magnatrix-logs:/opt/magnatrix/logs
    environment:
      - MAGNATRIX_ENV=production
      - MAGNATRIX_LOG_LEVEL=INFO
      - MAGNATRIX_HOST=0.0.0.0
      - MAGNATRIX_PORT=8080
    restart: unless-stopped
    networks:
      - magnatrix-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  magnatrix-data:
    driver: local
  magnatrix-logs:
    driver: local

networks:
  magnatrix-net:
    driver: bridge
