# MAGNATRIX-OS Docker Compose
# ═══════════════════════════════════════════
# Full stack: MAGNATRIX-OS + optional reverse proxy + monitoring
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up -d --build  # Rebuild and start
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop all

version: "3.8"

services:
  magnatrix-os:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: magnatrix-os:latest
    container_name: magnatrix-os
    restart: unless-stopped
    ports:
      - "8080:8080"    # Dashboard HTTP
      - "8765:8765"    # WebSocket metrics
      - "9090:9090"    # P2P mesh
    volumes:
      - magnatrix-data:/root/.magnatrix-os
      - ./website:/opt/magnatrix-os/website:ro
    environment:
      - MAGNATRIX_LOG_LEVEL=INFO
      - MAGNATRIX_WS_PORT=8765
      - MAGNATRIX_DASHBOARD_PORT=8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import magnatrix; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: Caddy reverse proxy with HTTPS
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: magnatrix-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
