version: '3.8'
services:
  magnatrix-core:
    build: {context: ../.., dockerfile: infrastructure/docker/Dockerfile}
    image: magnatrix/os:latest
    restart: unless-stopped
    ports: ["8080:8080", "8081:8081", "8082:8082"]
    environment:
      MAGNATRIX_ENV: production
      MAGNATRIX_DB_URL: postgresql://magnatrix:${DB_PASSWORD}@postgres:5432/magnatrix
      MAGNATRIX_REDIS_URL: redis://redis:6379
    volumes: [magnatrix-data:/app/data, magnatrix-logs:/app/logs]
    depends_on: [postgres, redis]
    networks: [magnatrix-net]
    deploy:
      resources:
        limits: {cpus: '4.0', memory: 8G}
        reservations: {cpus: '1.0', memory: 2G}
  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: magnatrix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-magnatrix123}
      POSTGRES_DB: magnatrix
    volumes: [postgres-data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    networks: [magnatrix-net]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: [redis-data:/data]
    ports: ["6379:6379"]
    networks: [magnatrix-net]
volumes:
  magnatrix-data:
  magnatrix-logs:
  postgres-data:
  redis-data:
networks:
  magnatrix-net: {driver: bridge}
