name: Deploy ke Hostinger VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
  HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
  HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          cat >> ~/.ssh/config <<EOF
          Host hostinger
            HostName ${{ env.HOSTINGER_HOST }}
            Port ${{ env.HOSTINGER_PORT }}
            User ${{ env.HOSTINGER_USER }}
            IdentityFile ~/.ssh/hostinger_key
            StrictHostKeyChecking no
          EOF
      - name: Deploy via SSH ke Hostinger
        run: |
          ssh hostinger << 'REMOTE'
            set -e
            echo "=== MAGNATRIX Deploy $(date) ==="
            mkdir -p /opt/magnatrix
            cd /opt/magnatrix
            # Clone atau pull latest
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/Magnatrix-Lab/MAGNATRIX-OS.git .
            fi
            # Write .env dari secrets (tidak pernah di-commit)
            cat > .env <<ENV
          MAGNATRIX_ENV=production
          SECRET_KEY=${{ secrets.MAG_SECRET_KEY }}
          MAGNATRIX_DB_URL=${{ secrets.MAGNATRIX_DB_URL }}
          MAGNATRIX_REDIS_URL=redis://redis:6379
          OPENAI_API_KEY=${{ secrets.OPENAI_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_KEY }}
          BINANCE_API_KEY=${{ secrets.BINANCE_KEY }}
          BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          HOSTINGER_API_TOKEN=${{ secrets.HOSTINGER_API_TOKEN }}
          ENV
            # Build & run
            docker-compose -f infrastructure/docker/docker-compose.hostinger.yml down
            docker-compose -f infrastructure/docker/docker-compose.hostinger.yml up --build -d
            docker system prune -f
            echo "=== Deploy selesai ==="
            docker ps
          REMOTE
      - name: Health Check
        run: |
          sleep 15
          curl -sf http://${{ env.HOSTINGER_HOST }}:8080/health || echo "Health check skipped — service may need more startup time"
