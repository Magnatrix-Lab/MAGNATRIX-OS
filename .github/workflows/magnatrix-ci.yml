name: MAGNATRIX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: 8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 mypy
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Type check with mypy
        run: mypy collective-brain/ governance/ knowledge/ p2p-mesh/ trading/ --ignore-missing-imports
      - name: Test with pytest
        run: pytest --cov=. --cov-report=xml
      - name: Upload coverage
        uses: 9cc74bf7e13a810454a28846494ddbc3795eb693  # v3.1.6
        with:
          files: ./coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build
          docker-compose -f docker-compose.yml up -d
      - name: Health check
        run: |
          sleep 10
          docker-compose ps
          docker-compose logs --tail=50
      - name: Stop containers
        run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
      - name: Upload security report
        uses: ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: security-report
          path: bandit-report.json

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Deploy to staging
        run: |
          echo "Deploying MAGNATRIX Agentic OS..."
          # Add deployment scripts here
      - name: Notify
        run: |
          echo "Deployment complete at $(date)"
