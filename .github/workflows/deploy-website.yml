name: Deploy Website to Hostinger VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Static Site
        run: |
          cd website
          python3 deploy.py --mode build

      - name: Deploy to Hostinger VPS
        uses: ea1eb4c526fe006abcc38797f5178af1d9d5e38f  # v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: magnatrix-website
          docker-compose-path: website/docker-compose.yml
          environment-variables: |
            NODE_ENV=production
            PORT=80
