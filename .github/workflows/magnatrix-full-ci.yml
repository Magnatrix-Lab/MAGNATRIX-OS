name: MAGNATRIX CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: magnatrix/os
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: b64ffcaf5b410884ad320a9cfac8866006a109aa  # v4.8.0
        with: {python-version: '${{ env.PYTHON_VERSION }}'}
      - run: pip install ruff black mypy
      - run: ruff check . --select E,W,F,I
      - run: black --check .
      - run: mypy collective-brain/ api-router/ trading/ knowledge/ --ignore-missing-imports
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: ankane/pgvector:latest
        env: {POSTGRES_PASSWORD: testpass}
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: b64ffcaf5b410884ad320a9cfac8866006a109aa  # v4.8.0
        with: {python-version: '${{ env.PYTHON_VERSION }}'}
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - run: pytest tests/ --cov=. --cov-report=xml -v
      - uses: 9cc74bf7e13a810454a28846494ddbc3795eb693  # v3.1.6
        with: {files: ./coverage.xml}
  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: b64ffcaf5b410884ad320a9cfac8866006a109aa  # v4.8.0
        with: {python-version: '${{ env.PYTHON_VERSION }}'}
      - run: pip install -r requirements.txt
      - run: python tests/integration/layer_integration_orchestrator.py
      - run: python tests/comprehensive_test_suite.py
  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: pip install bandit safety
      - run: bandit -r . -f json -o bandit-report.json || true
      - run: safety check --json || true
  build:
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security]
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: d70bba72b1f3fd22344832f00baa16ece964efeb  # v3.3.0
      - uses: 9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: 11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Deploy ke Hostinger VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
            cd /opt/magnatrix
            docker-compose -f infrastructure/docker/docker-compose.prod.yml pull
            docker-compose -f infrastructure/docker/docker-compose.prod.yml up -d
            docker system prune -f
          EOF
        env:
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
