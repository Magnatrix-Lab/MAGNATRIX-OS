<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNATRIX-OS — Super AI Wiring Diagram</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg-card: #111118;
  --accent: #00f0ff;
  --accent2: #ff0055;
  --accent3: #00ff88;
  --accent4: #ffaa00;
  --accent5: #aa66ff;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #222;
  --glow-cyan: rgba(0,240,255,0.2);
  --glow-pink: rgba(255,0,85,0.2);
  --glow-green: rgba(0,255,136,0.2);
  --glow-orange: rgba(255,170,0,0.2);
  --glow-purple: rgba(170,102,255,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow: hidden;
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.header {
  position: relative; z-index: 10;
  padding: 20px 30px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,240,255,0.05) 0%, transparent 100%);
}
.header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
.header .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

.diagram-container {
  position: relative; z-index: 5;
  width: 100vw; height: calc(100vh - 80px);
  display: flex; align-items: center; justify-content: center;
}

/* SVG Diagram */
.wiring-svg { width: 100%; height: 100%; max-width: 1200px; max-height: 800px; }

.module-node {
  cursor: pointer;
  transition: all 0.3s ease;
}
.module-node:hover { filter: brightness(1.3); }

.module-rect {
  rx: 12; ry: 12;
  stroke-width: 2;
  transition: all 0.3s ease;
}

.module-label { font-size: 14px; font-weight: 700; fill: #fff; text-anchor: middle; pointer-events: none; }
.module-sublabel { font-size: 10px; fill: var(--text-dim); text-anchor: middle; pointer-events: none; }

/* Connection lines */
.connection {
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 8 4;
  animation: dashFlow 1.5s linear infinite;
  opacity: 0.6;
}
@keyframes dashFlow {
  to { stroke-dashoffset: -24; }
}

.connection-label {
  font-size: 9px; fill: var(--text-dim);
  text-anchor: middle; background: var(--bg);
}

/* Central hub */
.hub-circle {
  animation: hubPulse 2s ease-in-out infinite;
}
@keyframes hubPulse {
  0%, 100% { filter: drop-shadow(0 0 8px var(--glow-cyan)); }
  50% { filter: drop-shadow(0 0 20px var(--glow-cyan)); }
}

/* Feedback loop */
.feedback-loop {
  stroke: var(--accent2);
  stroke-width: 3;
  fill: none;
  stroke-dasharray: 12 6;
  animation: dashFlow 2s linear infinite;
  opacity: 0.8;
}

/* Legend */
.legend {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  font-size: 0.8rem;
}
.legend-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* Info panel */
.info-panel {
  position: fixed; top: 80px; right: 20px; z-index: 10;
  width: 300px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px;
  transform: translateX(340px);
  transition: transform 0.3s ease;
}
.info-panel.active { transform: translateX(0); }
.info-panel h3 { color: var(--accent); font-size: 1rem; margin-bottom: 12px; }
.info-panel p { font-size: 0.8rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 8px; }
.info-panel .wiring-list { font-size: 0.75rem; color: var(--text); }
.info-panel .wiring-list li { margin: 4px 0; list-style: none; }
.info-panel .wiring-list li::before { content: "→ "; color: var(--accent); }

.close-btn {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: var(--text-dim);
  font-size: 1.2rem; cursor: pointer;
}
.close-btn:hover { color: var(--accent); }

/* Stats bar */
.stats-bar {
  position: fixed; bottom: 20px; right: 20px; z-index: 10;
  display: flex; gap: 16px;
}
.stat-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 16px; text-align: center;
}
.stat-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

/* Pulse animation for active connections */
.pulse-dot {
  animation: pulseDot 1.5s ease-in-out infinite;
}
@keyframes pulseDot {
  0%, 100% { opacity: 0.4; r: 3; }
  50% { opacity: 1; r: 6; }
}

</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="header">
  <h1>Super AI Wiring Diagram</h1>
  <div class="subtitle">Cross-Module Integration — MAGNATRIX-OS Layer 17</div>
</div>

<div class="diagram-container">
<svg class="wiring-svg" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00f0ff"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff0055"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ff88"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffaa00"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#aa66ff"/>
    </marker>
  </defs>

  <!-- Constitution (Top) -->
  <g class="module-node" onclick="showInfo('constitution')">
    <rect class="module-rect" x="500" y="40" width="200" height="70" rx="12" fill="#111118" stroke="#aa66ff" stroke-width="2"/>
    <text class="module-label" x="600" y="70">Constitution</text>
    <text class="module-sublabel" x="600" y="90">Mutable Values + Lock-in Guard</text>
  </g>

  <!-- Alignment Engine (Left) -->
  <g class="module-node" onclick="showInfo('alignment')">
    <rect class="module-rect" x="80" y="350" width="200" height="70" rx="12" fill="#111118" stroke="#00f0ff" stroke-width="2"/>
    <text class="module-label" x="180" y="380">Alignment Engine</text>
    <text class="module-sublabel" x="180" y="400">Real-time Scoring + Intervention</text>
  </g>

  <!-- Goal Formation (Right) -->
  <g class="module-node" onclick="showInfo('goals')">
    <rect class="module-rect" x="920" y="350" width="200" height="70" rx="12" fill="#111118" stroke="#ffaa00" stroke-width="2"/>
    <text class="module-label" x="1020" y="380">Goal Formation</text>
    <text class="module-sublabel" x="1020" y="400">Decomposition + Planning</text>
  </g>

  <!-- Self Improvement (Bottom) -->
  <g class="module-node" onclick="showInfo('improvement')">
    <rect class="module-rect" x="500" y="660" width="200" height="70" rx="12" fill="#111118" stroke="#00ff88" stroke-width="2"/>
    <text class="module-label" x="600" y="690">Self Improvement</text>
    <text class="module-sublabel" x="600" y="710">AST Parsing + Patch Engine</text>
  </g>

  <!-- Integrated Brain (Center) -->
  <g class="module-node hub-circle" onclick="showInfo('brain')">
    <circle cx="600" cy="400" r="70" fill="#111118" stroke="#00f0ff" stroke-width="3"/>
    <text class="module-label" x="600" y="395">Integrated</text>
    <text class="module-label" x="600" y="415">Brain</text>
  </g>

  <!-- Connections: Brain to Constitution -->
  <path class="connection" d="M600 330 Q600 200 600 110" stroke="#aa66ff" marker-end="url(#arrow-purple)"/>
  <path class="connection" d="M530 400 Q400 200 530 110" stroke="#aa66ff" marker-end="url(#arrow-purple)" opacity="0.3"/>
  <text class="connection-label" x="640" y="200">enforcement metrics</text>
  <text class="connection-label" x="640" y="215">compliance check</text>

  <!-- Connections: Brain to Alignment -->
  <path class="connection" d="M530 400 Q300 400 280 380" stroke="#00f0ff" marker-end="url(#arrow-cyan)"/>
  <path class="connection" d="M280 420 Q300 400 530 420" stroke="#00f0ff" marker-end="url(#arrow-cyan)" opacity="0.3"/>
  <text class="connection-label" x="350" y="390">score actions</text>
  <text class="connection-label" x="350" y="435">threshold adjust</text>

  <!-- Connections: Brain to Goals -->
  <path class="connection" d="M670 400 Q850 400 920 380" stroke="#ffaa00" marker-end="url(#arrow-orange)"/>
  <path class="connection" d="M920 420 Q850 400 670 420" stroke="#ffaa00" marker-end="url(#arrow-orange)" opacity="0.3"/>
  <text class="connection-label" x="800" y="390">form goals</text>
  <text class="connection-label" x="800" y="435">abandon misaligned</text>

  <!-- Connections: Brain to Self Improvement -->
  <path class="connection" d="M600 470 Q600 600 600 660" stroke="#00ff88" marker-end="url(#arrow-green)"/>
  <path class="connection" d="M530 660 Q400 500 530 470" stroke="#00ff88" marker-end="url(#arrow-green)" opacity="0.3"/>
  <text class="connection-label" x="640" y="570">generate patches</text>
  <text class="connection-label" x="640" y="585">alignment check</text>

  <!-- Cross-module direct connections -->
  <!-- Alignment → Goals (alignment check before goal execute) -->
  <path class="connection" d="M280 390 Q500 300 920 380" stroke="#ff0055" stroke-dasharray="4 4" opacity="0.5" marker-end="url(#arrow-pink)"/>
  <text class="connection-label" x="600" y="330" fill="#ff0055">goal alignment check</text>

  <!-- Goals → Alignment (goal metadata for scoring) -->
  <path class="connection" d="M920 410 Q500 500 280 410" stroke="#ff0055" stroke-dasharray="4 4" opacity="0.3" marker-end="url(#arrow-pink)"/>

  <!-- Improvement → Goals (code issues form goals) -->
  <path class="connection" d="M600 660 Q800 600 1020 420" stroke="#ffaa00" stroke-dasharray="4 4" opacity="0.5" marker-end="url(#arrow-orange)"/>
  <text class="connection-label" x="850" y="620" fill="#ffaa00">bottleneck → goals</text>

  <!-- Constitution → Alignment (values drive rules) -->
  <path class="connection" d="M530 110 Q200 200 280 360" stroke="#aa66ff" stroke-dasharray="4 4" opacity="0.5" marker-end="url(#arrow-purple)"/>
  <text class="connection-label" x="300" y="200" fill="#aa66ff">values → rules</text>

  <!-- Feedback Loop (outer ring) -->
  <path class="feedback-loop" d="M100 200 A 500 300 0 1 1 1100 200" stroke="#ff0055" fill="none" opacity="0.4"/>
  <text class="connection-label" x="1100" y="180" fill="#ff0055">Feedback Loop</text>

  <!-- Pulse dots on connections -->
  <circle class="pulse-dot" cx="600" cy="220" r="3" fill="#aa66ff"/>
  <circle class="pulse-dot" cx="400" cy="400" r="3" fill="#00f0ff"/>
  <circle class="pulse-dot" cx="800" cy="400" r="3" fill="#ffaa00"/>
  <circle class="pulse-dot" cx="600" cy="565" r="3" fill="#00ff88"/>
  <circle class="pulse-dot" cx="600" cy="330" r="3" fill="#ff0055"/>

</svg>
</div>

<!-- Legend -->
<div class="legend">
  <div style="font-weight:700; margin-bottom:8px; color:var(--accent);">Module Legend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#aa66ff"></div> Constitution (Values)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00f0ff"></div> Alignment (Scoring)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div> Goals (Formation)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div> Self-Improvement</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff0055"></div> Feedback / Cross-Check</div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-value">5</div><div class="stat-label">Modules</div></div>
  <div class="stat-item"><div class="stat-value">12</div><div class="stat-label">Connections</div></div>
  <div class="stat-item"><div class="stat-value">4</div><div class="stat-label">Feedback Loops</div></div>
  <div class="stat-item"><div class="stat-value">1</div><div class="stat-label">Brain</div></div>
</div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <button class="close-btn" onclick="hideInfo()">×</button>
  <h3 id="infoTitle">Module Info</h3>
  <p id="infoDesc">Click on a module to see details.</p>
  <ul class="wiring-list" id="infoWiring"></ul>
</div>

<script>
const moduleInfo = {
  constitution: {
    title: "Constitution Store",
    desc: "Mutable constitution with value lock-in protection. Supports weighted voting, quorum requirements, amendment expiration, cross-article consistency, semantic lock-in detection, and enforcement metrics.",
    wiring: [
      "Receives alignment enforcement scores",
      "Feeds values to alignment rule engine",
      "Protects against permanent lock-in",
      "Emergency override with full audit trail",
      "Amendment voting with reputation weighting",
    ]
  },
  alignment: {
    title: "Alignment Engine",
    desc: "Real-time behavior scoring with predictive alignment, temporal context, pattern memory, and multi-agent peer review. Intervenes before misaligned actions execute.",
    wiring: [
      "Scores every goal before execution",
      "Scores every patch before application",
      "Escalating penalties for repeat offenders",
      "Pattern recognition from violation history",
      "Multi-agent consensus voting",
      "Cascading effects tracking",
    ]
  },
  goals: {
    title: "Goal Formation Engine",
    desc: "Emergent goal formation with adaptive need detection, automatic decomposition, temporal planning, resource estimation, synergy detection, and intelligent abandonment.",
    wiring: [
      "Receives system state → detects needs",
      "Receives code analysis → forms improvement goals",
      "Decomposes goals into sub-goals with milestones",
      "Checks alignment before execution",
      "Re-evaluates and abandons stale goals",
      "Detects cross-goal synergies",
    ]
  },
  improvement: {
    title: "Self Improvement Engine",
    desc: "Recursive self-improvement with real AST parsing, dead code detection, differential benchmarking, patch ranking, and sandbox rollback.",
    wiring: [
      "Analyzes code with token-level AST",
      "Detects dead functions and unused imports",
      "Benchmarks before/after patch application",
      "Ranks patches by predicted improvement",
      "Requires alignment approval before apply",
      "Full rollback capability",
    ]
  },
  brain: {
    title: "Integrated Brain",
    desc: "Central orchestrator that wires all 4 modules into a unified feedback loop. Manages system health, mode switching, and cross-module feedback.",
    wiring: [
      "Cycles: detect → form → align → improve → feedback",
      "Auto-adjusts alignment threshold",
      "Switches mode (NORMAL → SAFE → EMERGENCY)",
      "Computes composite system health score",
      "Generates actionable insights",
      "Records full state history",
    ]
  }
};

function showInfo(module) {
  const info = moduleInfo[module];
  if (!info) return;
  document.getElementById('infoTitle').textContent = info.title;
  document.getElementById('infoDesc').textContent = info.desc;
  const wiringList = document.getElementById('infoWiring');
  wiringList.innerHTML = info.wiring.map(w => `<li>${w}</li>`).join('');
  document.getElementById('infoPanel').classList.add('active');
}

function hideInfo() {
  document.getElementById('infoPanel').classList.remove('active');
}
</script>
</body>
</html>
