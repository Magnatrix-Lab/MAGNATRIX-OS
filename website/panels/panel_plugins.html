<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNATRIX Plugins</title>
<style>
:root { --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24; --text:#e8e8f0; --text2:#8888a0; --text3:#555570; --cyan:#00e5ff; --green:#69f0ae; --orange:#ffab40; --purple:#b388ff; --border:rgba(255,255,255,0.06); --font-mono:'SF Mono','Fira Code',monospace; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:13px; height:100vh; overflow:hidden; }
.app { display:grid; grid-template-rows:48px 1fr; height:100vh; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:var(--bg2); border-bottom:1px solid var(--border); }
.topbar .title { font-size:14px; font-weight:600; }
.add-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:5px 14px; border-radius:6px; font-size:12px; cursor:pointer; }
.main { padding:16px; overflow:auto; }

.plugin-row { display:grid; grid-template-columns:40px 1fr 100px 80px 100px 60px; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center; font-size:12px; }
.plugin-header { color:var(--text2); font-size:10px; text-transform:uppercase; font-weight:600; }
.plugin-icon { font-size:20px; text-align:center; }
.plugin-name { font-weight:600; }
.plugin-status { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:700; }
.status-on { background:rgba(105,240,174,0.12); color:var(--green); }
.status-off { background:rgba(255,82,82,0.12); color:#ff5252; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--text3); border-radius:2px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">🔌 MAGNATRIX Plugins <span style="color:var(--text3);font-weight:400;">| Extensions</span></div>
    <button class="add-btn" onclick="alert('Plugin marketplace coming soon')">+ Install</button>
  </div>
  <div class="main">
    <div class="plugin-row plugin-header"><span></span><span>Name</span><span>Version</span><span>Status</span><span>Type</span><span></span></div>
    <div id="pluginList"></div>
  </div>
</div>

<script>
const plugins = [
  { icon:'🧠', name:'brain-local', version:'2.0.0', status:'on', statusClass:'status-on', type:'Core' },
  { icon:'📊', name:'trading-desk', version:'1.1.0', status:'on', statusClass:'status-on', type:'GUI' },
  { icon:'🔐', name:'crypto-bridge', version:'1.0.2', status:'on', statusClass:'status-on', type:'Security' },
  { icon:'🌐', name:'p2p-mesh', version:'1.3.0', status:'on', statusClass:'status-on', type:'Network' },
  { icon:'📡', name:'router-9', version:'0.9.1', status:'on', statusClass:'status-on', type:'API' },
  { icon:'🔄', name:'cc-switch', version:'0.8.0', status:'on', statusClass:'status-on', type:'Tool' },
  { icon:'📋', name:'kanban-board', version:'1.0.0', status:'on', statusClass:'status-on', type:'GUI' },
  { icon:'📝', name:'obsidian-vault', version:'0.5.0', status:'off', statusClass:'status-off', type:'Knowledge' },
  { icon:'💻', name:'terminal-shell', version:'0.3.0', status:'off', statusClass:'status-off', type:'Dev' },
];

function render() {
  document.getElementById('pluginList').innerHTML = plugins.map(p => `
    <div class="plugin-row">
      <span class="plugin-icon">${p.icon}</span>
      <span class="plugin-name">${p.name}</span>
      <span style="color:var(--text2)">${p.version}</span>
      <span class="plugin-status ${p.statusClass}">${p.status}</span>
      <span style="color:var(--text3)">${p.type}</span>
      <span style="color:var(--text2);cursor:pointer" onclick="toggle('${p.name}')">⚙️</span>
    </div>
  `).join('');
}
function toggle(name) {
  const p = plugins.find(x => x.name === name);
  if (p) { p.status = p.status === 'on' ? 'off' : 'on'; p.statusClass = p.status === 'on' ? 'status-on' : 'status-off'; }
  render();
}
render();
</script>
</body>
</html>
