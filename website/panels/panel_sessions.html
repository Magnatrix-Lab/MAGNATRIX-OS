<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNATRIX Sessions</title>
<style>
:root { --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24; --text:#e8e8f0; --text2:#8888a0; --text3:#555570; --cyan:#00e5ff; --green:#69f0ae; --orange:#ffab40; --border:rgba(255,255,255,0.06); --font-mono:'SF Mono','Fira Code',monospace; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:13px; height:100vh; overflow:hidden; }
.app { display:grid; grid-template-rows:48px 1fr; height:100vh; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:var(--bg2); border-bottom:1px solid var(--border); }
.topbar .title { font-size:14px; font-weight:600; }
.main { padding:16px; overflow:auto; }

.sess-row { display:grid; grid-template-columns:60px 1fr 100px 80px 100px 70px; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center; font-size:12px; }
.sess-header { color:var(--text2); font-size:10px; text-transform:uppercase; font-weight:600; }
.sess-id { color:var(--cyan); font-family:var(--font-mono); }
.sess-status { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:700; }
.sess-active { background:rgba(105,240,174,0.12); color:var(--green); }
.sess-idle { background:rgba(255,171,64,0.12); color:var(--orange); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--text3); border-radius:2px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">🔌 MAGNATRIX Sessions <span style="color:var(--text3);font-weight:400;">| Active Connections</span></div>
  </div>
  <div class="main">
    <div class="sess-row sess-header"><span>ID</span><span>Name</span><span>Type</span><span>Status</span><span>Started</span><span>Actions</span></div>
    <div id="sessionList"></div>
  </div>
</div>

<script>
const sessions = [
  { id:'s01', name:'Main Control', type:'GUI', status:'active', statusClass:'sess-active', started:'48h ago' },
  { id:'s02', name:'HFT Engine', type:'C++', status:'active', statusClass:'sess-active', started:'48h ago' },
  { id:'s03', name:'Crypto Vault', type:'Rust', status:'active', statusClass:'sess-active', started:'48h ago' },
  { id:'s04', name:'P2P Mesh', type:'Python', status:'active', statusClass:'sess-active', started:'48h ago' },
  { id:'s05', name:'Agent Loop', type:'Python', status:'active', statusClass:'sess-active', started:'47h ago' },
  { id:'s06', name:'Web Dashboard', type:'HTTP', status:'active', statusClass:'sess-active', started:'48h ago' },
  { id:'s07', name:'Terminal #1', type:'Console', status:'idle', statusClass:'sess-idle', started:'2h ago' },
  { id:'s08', name:'Git Sync', type:'Background', status:'idle', statusClass:'sess-idle', started:'5m ago' },
];

function render() {
  document.getElementById('sessionList').innerHTML = sessions.map(s => `
    <div class="sess-row">
      <span class="sess-id">${s.id}</span>
      <span>${s.name}</span>
      <span style="color:var(--text2)">${s.type}</span>
      <span class="sess-status ${s.statusClass}">${s.status}</span>
      <span style="color:var(--text3)">${s.started}</span>
      <span style="color:var(--text2);cursor:pointer" onclick="kill('${s.id}')">⏹</span>
    </div>
  `).join('');
}
function kill(id) {
  const s = sessions.find(x => x.id === id);
  if (s) { s.status = 'killed'; s.statusClass = 'sess-idle'; }
  render();
}
render();
</script>
</body>
</html>
